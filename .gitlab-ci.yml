# Р”РµРїР»РѕР№ РіРѕС‚РѕРІРѕРіРѕ РѕР±СЂР°Р·Р° РёР· Harbor (Р±РµР· СЃР±РѕСЂРєРё)
# Р—Р°РїСѓСЃРє: РїРµСЂРµРґР°С‚СЊ РїРµСЂРµРјРµРЅРЅС‹Рµ DEPLOY_IMAGE_TAG Рё STAND
# РџСЂРёРјРµСЂ: DEPLOY_IMAGE_TAG=registry.example.com/devops/trading-chatbot-demo:main-abc1234
deploy_image:
  stage: deploy
  image: registry.example.com/docker_helper_images/docker-24.0.9:latest
  needs: []
  rules:
    - if: $DEPLOY_IMAGE_TAG && $STAND == "dev"
      when: on_success
    - if: $DEPLOY_IMAGE_TAG && $STAND == "develop1"
      when: on_success
    - if: $DEPLOY_IMAGE_TAG && $STAND == "staging"
      when: on_success
    - if: $DEPLOY_IMAGE_TAG && $STAND == "production"
      when: on_success
    - when: never
  tags:
    - docker-new
  services:
    - name: registry.example.com/docker_helper_images/docker-dind-24.0.9:latest
      alias: docker
  variables:
    DEPLOY_DIR: "/home/${SSH_USER}/ai-chatbot"
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375       
  before_script:
#    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - |
      # Р’С‹Р±РёСЂР°РµРј SSH РєР»СЋС‡ РІ Р·Р°РІРёСЃРёРјРѕСЃС‚Рё РѕС‚ СЃС‚РµРЅРґР°
      if [ "$STAND" = "production" ]; then
        echo "$SSH_PRIVATE_KEY_PRODUCTION" | tr -d '\r' > ssh_key_temp
        export SSH_TARGET_HOST="$SSH_HOST_PRODUCTION"
      else
        echo "$SSH_PRIVATE_KEY_DEVELOP1" | tr -d '\r' > ssh_key_temp
        export SSH_TARGET_HOST="$SSH_HOST_DEVELOP1"
      fi
    - chmod 600 ssh_key_temp
    - ssh-add ssh_key_temp
    - rm ssh_key_temp
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - |
      echo "Deploying image: ${DEPLOY_IMAGE_TAG}"
      echo "Target stand: ${STAND}"
      
      # РћРїСЂРµРґРµР»СЏРµРј С…РѕСЃС‚
      if [ "$STAND" = "production" ]; then
        SSH_TARGET_HOST="$SSH_HOST_PRODUCTION"
      else
        SSH_TARGET_HOST="$SSH_HOST_DEVELOP1"
      fi
      
      # РР·РІР»РµРєР°РµРј registry РёР· IMAGE_TAG
      REGISTRY=$(echo "$DEPLOY_IMAGE_TAG" | cut -d'/' -f1)
      
      ssh ${SSH_USER}@${SSH_TARGET_HOST} "mkdir -p ${DEPLOY_DIR} ${DEPLOY_DIR}/nginx ${DEPLOY_DIR}/docs"
      scp nginx/default.conf ${SSH_USER}@${SSH_TARGET_HOST}:${DEPLOY_DIR}/nginx/default.conf
      scp -r docs/* ${SSH_USER}@${SSH_TARGET_HOST}:${DEPLOY_DIR}/docs/
      scp docker-compose.yml ${SSH_USER}@${SSH_TARGET_HOST}:${DEPLOY_DIR}/docker-compose.yml
      
      ssh ${SSH_USER}@${SSH_TARGET_HOST} "
        cd ${DEPLOY_DIR}
        
        echo 'DEPLOY_IMAGE_TAG=${DEPLOY_IMAGE_TAG}' > .env
        echo 'GEMINI_API_KEY=${GEMINI_API_KEY}' >> .env
        echo 'GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}' >> .env
        echo 'OPENAI_API_KEY=${OPENAI_API_KEY:-}' >> .env
        echo 'BACKEND_MASTER_URI=${BACKEND_MASTER_URI:-ws://gateway.example.com:11700}' >> .env
        echo 'BROKER_NAME=${BROKER_NAME:-Demo Broker}' >> .env
        echo 'ENVIRONMENT=${ENVIRONMENT:-develop}' >> .env
        echo 'ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://demo-frontend.example.com}' >> .env
        echo 'MONGO_ROOT_USER=root' >> .env
        echo 'MONGO_ROOT_PASSWORD=root' >> .env
        echo 'ALLOWED_PERSONAL_FIELDS=${ALLOWED_PERSONAL_FIELDS:-}' >> .env
        echo 'SCANNER_EXCLUDE_NODES=${SCANNER_EXCLUDE_NODES:-}' >> .env
        
        echo '${HARBOR_PASSWORD}' | docker login '${REGISTRY}' -u '${HARBOR_USERNAME}' --password-stdin
        
        echo 'Pulling image: ${DEPLOY_IMAGE_TAG}'
        docker pull '${DEPLOY_IMAGE_TAG}'
        
        echo 'Updating docker-compose to use specific image...'
        # РЎРѕР·РґР°С‘Рј override РґР»СЏ РёСЃРїРѕР»СЊР·РѕРІР°РЅРёСЏ РєРѕРЅРєСЂРµС‚РЅРѕРіРѕ РѕР±СЂР°Р·Р°
        echo 'services:' > docker-compose.override.yml
        echo '  ai-chatbot:' >> docker-compose.override.yml
        echo '    image: ${DEPLOY_IMAGE_TAG}' >> docker-compose.override.yml
        
        echo 'Restarting containers...'
        docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --remove-orphans --pull always --force-recreate ai-chatbot

        echo 'Verifying ai-warn route in running container...'
        docker exec ai-chatbot-backend sh -lc "grep -n 'ai-warn-tags' /app/routes/chat.routes.js"

        echo 'Verifying ai-warn endpoint status...'
        AI_WARN_STATUS=$(docker exec ai-chatbot-backend sh -lc "wget -qSO- http://localhost:3001/ai-chat-api/ai-warn-tags/1 -O /dev/null 2>&1 | awk '/HTTP\//{print \$2}' | tail -1")
        echo "ai-warn endpoint HTTP status: ${AI_WARN_STATUS}"
        if [ "${AI_WARN_STATUS}" = "404" ]; then
          echo 'ERROR: ai-warn endpoint is missing in runtime container'
          exit 1
        fi
      "
      
      echo "вњ… Deployed ${DEPLOY_IMAGE_TAG} to ${STAND}"

# Trigger pipeline in igit-develop repository (С‚РѕР»СЊРєРѕ РїСЂРё РІС‹РєР°С‚РєРµ РІ production)
trigger_igit_develop:
  stage: trigger
  rules:
    - if: $STAND == "production"
      when: on_success
    - when: never
  trigger:
    project: bp/igit-develop
    branch: main
    strategy: depend
  variables:
    UPSTREAM_PROJECT_NAME: "ai-support"
    UPSTREAM_BRANCH: $CI_COMMIT_REF_NAME
    UPSTREAM_COMMIT_SHORT_SHA: $CI_COMMIT_SHORT_SHA

