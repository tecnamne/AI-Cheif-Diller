# Upstream СѓРєР°Р·С‹РІР°РµС‚ РЅР° РёРјСЏ СЃРµСЂРІРёСЃР° РІ docker-compose
upstream ai_chatbot {
    server ai-chatbot:3001;
    keepalive 32;
}

server {
    listen 80;
    # РЈРєР°Р·С‹РІР°РµРј РІР°С€ С‚РµРєСѓС‰РёР№ РґРѕРјРµРЅ
    server_name demo-frontend.example.com;

    # Р›РѕРіРё
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip (СЃР¶Р°С‚РёРµ РѕС‚РІРµС‚РѕРІ)
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # =====================
    # Chat API (СЃ СѓРІРµР»РёС‡РµРЅРЅС‹РјРё С‚Р°Р№РјР°СѓС‚Р°РјРё)
    # =====================
    location /ai-chat-api {
        proxy_pass http://ai_chatbot;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts (РІР°Р¶РЅРѕ РґР»СЏ AI)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # =====================
    # Scanner API (РµС‰Рµ Р±РѕР»СЊС€Рµ С‚Р°Р№РјР°СѓС‚)
    # =====================
    location /api/scanner {
        proxy_pass http://ai_chatbot;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300s;
    }

    # =====================
    # РћСЃС‚Р°Р»СЊРЅС‹Рµ Р·Р°РїСЂРѕСЃС‹ (Healthcheck Рё РґСЂ)
    # =====================
    location / {
        proxy_pass http://ai_chatbot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
